  <text x="456" y="262" fill="#E9F3FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="700" letter-spacing="2">THUMB JOURNEY</text>
  <text x="456" y="314" fill="#88A7D2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="500" letter-spacing="1.8">IMMERSIVE MOBILE AUDIO EXPERIENCE</text>

  <rect x="456" y="352" width="420" height="2" rx="1" fill="url(#strokeAccent)" fill-opacity="0.9" />

  <text x="456" y="406" fill="#CFE3FF" fill-opacity="0.95" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">
