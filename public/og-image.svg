    <filter id="cardShadow" x="109" y="82" width="982" height="466" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <g filter="url(#blurStrong)">
