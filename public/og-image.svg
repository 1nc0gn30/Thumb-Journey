<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="122" y1="42" x2="1098" y2="610" gradientUnits="userSpaceOnUse">
      <stop stop-color="#121B34" />
      <stop offset="0.55" stop-color="#0A1020" />
      <stop offset="1" stop-color="#060A14" />
    </linearGradient>
    <linearGradient id="flareA" x1="194" y1="141" x2="495" y2="397" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D7CFF" stop-opacity="0.88" />
      <stop offset="1" stop-color="#2D7CFF" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="flareB" x1="826" y1="246" x2="1040" y2="529" gradientUnits="userSpaceOnUse">
      <stop stop-color="#15E1C6" stop-opacity="0.65" />
      <stop offset="1" stop-color="#15E1C6" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="strokeAccent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#5BA4FF" />
