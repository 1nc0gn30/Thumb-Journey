    <ellipse cx="930" cy="420" rx="220" ry="160" fill="url(#flareB)" />
  </g>

  <rect x="140" y="114" width="920" height="402" rx="38" fill="#0A0F1E" fill-opacity="0.62" stroke="url(#strokeAccent)" stroke-opacity="0.48" filter="url(#cardShadow)" />

  <g opacity="0.9">
    <rect x="198" y="190" width="92" height="156" rx="24" fill="#0F1932" stroke="#4E87E0" stroke-opacity="0.75" />
    <rect x="221" y="218" width="46" height="101" rx="15" fill="#0A1225" stroke="#89B7FF" stroke-opacity="0.65" />
    <rect x="236" y="252" width="16" height="33" rx="8" fill="#D3EAFF" fill-opacity="0.9" />
    <circle cx="335" cy="268" r="9" fill="#67A8FF" />
    <circle cx="367" cy="268" r="9" fill="#67A8FF" fill-opacity="0.8" />
    <circle cx="399" cy="268" r="9" fill="#67A8FF" fill-opacity="0.6" />
